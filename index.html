<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GHL Design Previews</title>

    <!-- Inter font, matches HighRise tokens.css -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!--
      Font Awesome 5.8.1 — pinned to match what spm-ts uses so icon names
      (e.g. "fas fa-mobile-alt") resolve identically across both repos.
    -->
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.8.1/css/all.css"
      integrity="sha384-50oBUHEmvpQ+1lW4y57PTFmhCaXp0ML5d60M1M7uH2+nqUivzIebhndOJK28anvf"
      crossorigin="anonymous"
    />
  </head>
  <!--
    `data-theme="default-dark-v1"` mirrors the attribute spm-ts sets on
    <body> in prod. Many sidebar/topbar dark-theme rules in the vendored
    PMDApp.vue style block are scoped to body[data-theme='default-dark-v1'],
    so without this attribute those rules don't apply.
  -->
  <body data-theme="default-dark-v1">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
